version: "3.9"

services:
  postgres:
    image: postgres:16.13-alpine
    container_name: postgres_dw
    restart: unless-stopped
    environment:
      POSTGRES_DB: data_warehouse
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
    ports:
      - "5544:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data_net

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio_store
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - data_net

  metabase:
    image: metabase/metabase:v0.57.16
    container_name: metabase_app
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    volumes:
      - metabase_data:/metabase-data
    networks:
      - data_net
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow_init
    depends_on:
      - postgres
      - minio
    environment:
      AIRFLOW__WEBSERVER__SECRET_KEY: "fahasa_secret_key_123"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:123456@postgres:5432/data_warehouse
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.session,airflow.api.auth.backend.basic_auth
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: data-lake
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: data_warehouse
      PYTHONPATH: /opt/airflow/project
      MAX_FAILURE_RATE: 0.05
      MIN_VALID_PRODUCTS: 10
      MIN_TOTAL_PRODUCTS: 10
    user: "50000:0"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./:/opt/airflow/project
    working_dir: /opt/airflow/project
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname admin
      --lastname admin
      --role Admin
      --email admin@example.com || true
      "
    networks:
      - data_net
  
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow_webserver
    restart: unless-stopped
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__WEBSERVER__SECRET_KEY: "fahasa_secret_key_123"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:123456@postgres:5432/data_warehouse
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.session,airflow.api.auth.backend.basic_auth
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: data-lake
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: data_warehouse
      PYTHONPATH: /opt/airflow/project
      MAX_FAILURE_RATE: 0.05
      MIN_VALID_PRODUCTS: 10
      MIN_TOTAL_PRODUCTS: 10
    user: "50000:0"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./:/opt/airflow/project
    working_dir: /opt/airflow/project
    ports:
      - "8080:8080"
    command: airflow webserver
    networks:
      - data_net

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow_scheduler
    restart: unless-stopped
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__WEBSERVER__SECRET_KEY: "fahasa_secret_key_123"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.session,airflow.api.auth.backend.basic_auth
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:123456@postgres:5432/data_warehouse
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: data-lake
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: data_warehouse
      PYTHONPATH: /opt/airflow/project
      MAX_FAILURE_RATE: 0.05
      MIN_VALID_PRODUCTS: 10
      MIN_TOTAL_PRODUCTS: 10
    user: "50000:0"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./:/opt/airflow/project
    working_dir: /opt/airflow/project
    command: airflow scheduler
    networks:
      - data_net

volumes:
  postgres_data:
  minio_data:
  metabase_data:

networks:
  data_net:
    driver: bridge